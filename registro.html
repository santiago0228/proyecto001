<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Clientes</title>
    <link rel="stylesheet" href="estilo/estilo.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <form method="POST" action="registro.php" class="c1">
        <h3>Registro de Ingreso</h3>
        <input type="text" name="doc" placeholder="Documento" required>
        <input type="text" name="nom" placeholder="Nombres" required>
        <input type="text" name="ape" placeholder="Apellidos" required>
        <input type="text" name="tel" placeholder="Móvil" required>
        <input type="email" name="mail" placeholder="Correo" required>
        <input type="text" name="emp" placeholder="Empresa" required>
        <input type="text" name="car" placeholder="Cargo" required>
        <input type="text" name="pro" placeholder="Profesión" required>

        <button type="submit" name="registro_evento" class="btt">Registrar Cliente</button>
    </form>

</body>
</html>
